<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>행정정보 통합관리 기본법 검색</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__content">
        <h1 class="hero__title">행정정보 통합관리 기본법 조항 검색</h1>
        <p>검색어를 입력하면 관련 조항을 바로 확인할 수 있습니다.</p>
        <form id="search-form" class="search-box">
          <input id="search-input" type="text" placeholder="예: 기본계획, 공동활용, 표준" />
          <button type="submit">검색</button>
        </form>
      </div>
    </header>

    <main class="container">
      <section class="summary">
        <div>
          <p class="summary__label">검색 결과</p>
          <h2 id="result-title">전체 조항 보기</h2>
        </div>
        <p id="result-count" class="summary__count">0건</p>
      </section>

      <section class="cardnews-row">
        <img src="첨부/이미지/카드뉴스1.png" alt="카드뉴스 1" />
        <img src="첨부/이미지/카드뉴스2.png" alt="카드뉴스 2" />
        <img src="첨부/이미지/카드뉴스3.png" alt="카드뉴스 3" />
        <img src="첨부/이미지/카드뉴스4.png" alt="카드뉴스 4" />
      </section>

      <section id="results" class="results-grid"></section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
